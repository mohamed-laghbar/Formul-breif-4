<!DOCTYPE html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="logo.png" alt="YouCode" />
      </div>
    </header>
    <div class="main">
      <div class="image">
        <img src="image1.png" alt="RealEstate">
      </div>
    <div class="search-box">
      <form>
        <label>What are you searching for: </label>
        <select>
          <option>Appartement</option>
          <option>House</option>
          <option>Villa</option>
          <option>Room</option>
        </select>

        <label>Number Of Bedrooms</label>
        <input type="text" placeholder="1,2,3..." />

        <label>Price Range</label>
        <div class="price-min-max">
        <input type="text" placeholder="Min" />
        <span>-</span>
        <input type="text" placeholder="Max" />
    </div>
        <label for="">Search Radios</label>
        <input type="range" name="" id="search-radios" />
        <input type="checkbox" name="" id="checkbox"  />
        <label class="sold" >Sold Properties</label>
        
        <input type="submit" name="" id="btn">
      </form>
    </div>
  </div>
  </body>
</html>
